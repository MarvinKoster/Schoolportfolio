<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Nieuwe Inhoud Toevoegen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Inhoud toevoegen</h2>

<form action="save.php" method="post" class="add-form">
    <label for="title">Titel:</label>
    <input type="text" id="title" name="title" required>

    <label for="description">Beschrijving:</label>
    <textarea id="description" name="description" rows="5" required></textarea>

    <label for="rating">Resultaat (1–10):</label>
    <input type="number" id="rating" name="rating" min="1" max="10" step="0.1" required>

    <button type="submit">Opslaan</button>
</form>

</body>
</html>
